<!DOCTYPE html>
<html>
<head>
    <title>Список статей</title>
</head>
<body>
    <h1>Список статей</h1>

    {% for article in articles %}
        <div>
            <h2>
                <a href="{% url 'article_detail' article.id %}">
                    {{ article.title }}
                </a>
            </h2>
            <p>Автор: {{ article.author.username }}</p>
            <p>Дата: {{ article.published_date }}</p>
        </div>
        <hr>
    {% empty %}
        <p>Статей немає</p>
    {% endfor %}
</body>
</html>
